<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - American Skyline Quality Standards</title>
    <link rel="icon" type="image/jpeg" href="{% static 'images/ASQS_NEW.jpg' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 28px 22px 28px 22px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.07);
            width: 100%;
            max-width: 425px;           /* Compact width */
            position: relative;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 18px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background-color: #4a5568;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .brand-logo {
            width: 145px;
            height: 70px;
            object-fit: contain;
            background: none;
        }

        .brand-name {
            font-size: 22px;           /* More compact */
            font-family: 'Times New Roman', Times, serif;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
            margin-top: 15px;
        }

        .form-group {
            margin-bottom: 15px;
            font-size: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #e1e5e9;
            border-radius: 5px;
            font-size: 15px;
            transition: border-color 0.3s ease;
            background-color: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a5568;
            background-color: white;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
        }

        .forgot-password {
            color: #4a5568;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #2d3748;
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            background-color: #4a5568;
            color: white;
            padding: 10px 0;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
            margin-top: 5px;
        }

        .login-button:hover {
            background-color: #2d3748;
            transform: translateY(-1px);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
            color: #666;
            font-size: 13px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e1e5e9;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 12px;
            position: relative;
            z-index: 2;
        }

        .signup-link {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: #666;
        }

        .signup-link a {
            color: #4a5568;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 22px 8px;
                max-width: 97vw;
            }
            .brand-name {
                font-size: 17px;
            }
        }

        /* Messages */
        .messages-container {
            margin-bottom: 16px;
        }

        .alert {
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            font-size: 0.8rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .alert-success {
            background: #f0fff4;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #feb2b2;
        }

        .close-alert {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            color: inherit;
            opacity: 0.7;
        }

        .close-alert:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <div class="logo">                    
                <img src="{% static 'images/ASQS_NEW.jpg' %}" 
                     alt="Company Logo" 
                     class="brand-logo"
                     width="145" height="70" >
            </div>
            <div class="brand-name">American Skyline Quality Standards</div>
        </div>

        <!-- Messages -->
        {% if messages %}
            <div class="messages-container">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        <i class="fas fa-{% if message.tags == 'success' %}check-circle{% elif message.tags == 'error' %}exclamation-circle{% else %}info-circle{% endif %}"></i>
                        {{ message }}
                        <button type="button" class="close-alert">&times;</button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form id="loginForm" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <span>Remember me</span>
                </label>
                <!-- <a href="#" class="forgot-password">Forgot Password?</a> -->
            </div>

            <button type="submit" class="login-button">Sign In</button>
        </form>

        <!-- <div class="divider">
            <span>or</span>
        </div>

        <div class="signup-link">
            Don't have an account? <a href="#">Create Account</a>
        </div> -->
    </div>

    <script>
    // Close alert messages and auto-hide functionality
    document.addEventListener('DOMContentLoaded', function() {
        const closeButtons = document.querySelectorAll('.close-alert');
        closeButtons.forEach(button => {
            button.addEventListener('click', function() {
                this.parentElement.style.display = 'none';
            });
        });

        // Auto-hide success messages after 5 seconds
        const successAlerts = document.querySelectorAll('.alert-success');
        successAlerts.forEach(alert => {
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => {
                    alert.style.display = 'none';
                }, 300);
            }, 5000);
        });
    });
    </script>
</body>
</html>
